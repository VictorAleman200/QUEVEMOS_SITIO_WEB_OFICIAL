    <script>
        /* Resaltar categoría activa al hacer scroll en el contenido */
        const mainContent = document.getElementById('mainContent');
        const sections = mainContent.querySelectorAll('.content');
        const sideLinks = document.querySelectorAll('.side-list a');

        mainContent.addEventListener('scroll', () => {
            let current = '';
            sections.forEach(sec => {
                const top = sec.offsetTop - 60;
                if (mainContent.scrollTop >= top) current = sec.id;
            });
            sideLinks.forEach(link => {
                link.classList.remove('active');
                if (link.getAttribute('href') === '#' + current) link.classList.add('active');
            });
        });

        /* Scroll suave dentro de main-content al hacer clic en sidebar */
        function setActive(el) {
            sideLinks.forEach(l => l.classList.remove('active'));
            el.classList.add('active');
            const target = document.querySelector(el.getAttribute('href'));
            if (target) target.scrollIntoView({ behavior: 'smooth' });
        }

        /* Interceptar clicks en los links del sidebar para hacer scroll interno */
        sideLinks.forEach(link => {
            link.addEventListener('click', e => {
                e.preventDefault();
                setActive(link);
            });
        });
    </script>
</body>
